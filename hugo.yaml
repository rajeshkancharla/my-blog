baseURL: "https://dataverse-ai.org/"
languageCode: "en-us"
title: "Dataverse AI Solutions"
theme: "PaperMod"

canonifyURLs: true

pagination:
  pagerSize: 10

params:
  env: production
  author: "Rajesh Kancharla"
  description: "Data & AI Engineering solutions for real-world problems."

  # ── Site mode toggle ──────────────────────────────────────────────────────
  # Set to true  → visitors land on the blog; all other nav links are hidden.
  # Set to false → full website with homepage, services, products, etc.
  blogOnlyMode: true
  # ─────────────────────────────────────────────────────────────────────────

  homeInfoParams:
    Title: "Engineering the Future with Data & AI"
    Content: >
      Dataverse builds intelligent data solutions at the intersection of
      Data Engineering and Artificial Intelligence.
      We help organisations unlock the power of their data through
      modern cloud architecture, scalable pipelines, generative AI and AI agents.

  socialIcons:
    - name: linkedin
      url: "https://linkedin.com/in/rajeshkancharla"
    - name: github
      url: "https://github.com/rajeshkancharla"

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true

  label:
    text: "Dataverse"

menu:
  # Full website menu (used when blogOnlyMode: false)
  main:
    - name: About
      url: /about/
      weight: 10
    - name: Blog
      url: /posts/
      weight: 20
    - name: Services
      url: /services/
      weight: 30
    - name: Products
      url: /products/
      weight: 40
    - name: Contact
      url: /contact/
      weight: 50
  # Blog-only menu (used when blogOnlyMode: true)
  blog:
    - name: Blog
      url: /posts/
      weight: 10

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true