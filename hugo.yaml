baseURL: "https://dataverse-ai.org/"
languageCode: "en-us"
title: "Dataverse AI"
theme: "PaperMod"

canonifyURLs: true

pagination:
  pagerSize: 10

params:
  env: production
  author: "Rajesh"
  description: "Data Engineering, AI, and building intelligent systems"

  homeInfoParams:
    Title: "Hi, I'm Rajesh 👋"
    Content: >
      Data & AI Engineer based in Sydney, Australia.
      Building real-world solutions at the intersection of Data Engineering and AI — and writing about everything I learn along the way.

  socialIcons:
    - name: linkedin
      url: "https://linkedin.com/in/rajeshkancharla"
    - name: github
      url: "https://github.com/rajeshkancharla"

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true

menu:
  main:
    - name: Posts
      url: /posts/
      weight: 1
    - name: About
      url: /about/
      weight: 2
    - name: Tags
      url: /tags/
      weight: 3

outputs:
  home:
    - HTML
    - RSS
    - JSON